services:
  postgres:
    image: postgres:16
    container_name: saas-turnos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_turnos
    ports:
      - "5432:5432"
    volumes:
      - saas_turnos_data:/var/lib/postgresql/data

volumes:
  saas_turnos_data:
